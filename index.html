<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフトスケジューラー</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --border2: #1c2128;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --text-dim: #3d444d;
  --accent: #7c3aed;
  --accent-soft: rgba(124,58,237,.12);
  --danger: #f85149;
  --success: #3fb950;
  --warning: #d29922;
  --today-bg: rgba(124,58,237,.06);
  --weekend-bg: rgba(255,255,255,.012);

  --label-w: 144px;
  --hour-w: 64px;
  --day-w: calc(var(--hour-w) * 24);
  --row-h: 46px;
  --topbar-h: 54px;
  --day-label-h: 30px;
  --hour-label-h: 26px;
  --time-h: calc(var(--day-label-h) + var(--hour-label-h));
  --grade-h: 28px;
  --daynav-h: 52px;

  --g4: #a78bfa;
  --g3: #34d399;
  --g2: #60a5fa;
  --g1: #fb923c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  flex-shrink: 0;
  z-index: 200;
}
#topbar h1 { font-size: .95rem; font-weight: 700; white-space: nowrap; letter-spacing: -.01em; }
.tb-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 5px 11px; border-radius: 7px;
  cursor: pointer; font-size: .82rem; white-space: nowrap; font-weight: 500;
}
.tb-btn:hover { background: var(--border); }
#week-range { font-size: .88rem; font-weight: 600; min-width: 160px; text-align: center; }
.this-week-btn {
  background: var(--accent-soft); border: 1px solid rgba(124,58,237,.4);
  color: #a78bfa; padding: 5px 11px; border-radius: 7px;
  cursor: pointer; font-size: .8rem; font-weight: 600; white-space: nowrap;
}
.this-week-btn:hover { background: rgba(124,58,237,.22); }
.spacer { flex: 1; }
.mode-toggle {
  display: flex; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 2px; gap: 2px;
}
.mode-btn {
  padding: 4px 11px; border-radius: 6px; border: none; cursor: pointer;
  font-size: .8rem; font-weight: 700; background: transparent;
  color: var(--text-muted); transition: all .15s; white-space: nowrap;
}
.mode-btn.active.m-confirmed { background: #1f6feb; color: #fff; }
.mode-btn.active.m-desired   { background: #9e6a03; color: #fff; }
.icon-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; flex-shrink: 0;
}
.icon-btn:hover { background: var(--border); }
#sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ok          { background: var(--success); }
.error       { background: var(--danger); }
.connecting  { background: var(--warning); animation: blink .9s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* ── GANTT WRAPPER ── */
#gantt-wrapper { flex: 1; overflow: auto; padding-bottom: var(--daynav-h); }

/* ── GANTT ── */
#gantt {
  display: flex; flex-direction: column;
  min-width: calc(var(--label-w) + var(--day-w) * 7);
  position: relative;
}

/* ── TIME HEADER ── */
#time-header {
  position: sticky; top: 0; z-index: 50;
  display: flex; height: var(--time-h);
  background: var(--bg); border-bottom: 2px solid var(--border);
}
.th-spacer {
  width: var(--label-w); flex-shrink: 0;
  position: sticky; left: 0; z-index: 60;
  background: var(--bg); border-right: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 2px;
}
.th-spacer span { font-size: .68rem; color: var(--text-dim); }
.th-day {
  width: var(--day-w); flex-shrink: 0;
  display: flex; flex-direction: column;
  border-right: 2px solid var(--border);
}
.th-day.is-today .th-day-label { background: var(--accent-soft); }
.th-day-label {
  height: var(--day-label-h); display: flex; align-items: center;
  padding: 0 10px; gap: 6px; border-bottom: 1px solid var(--border2);
}
.th-day-name { font-size: .85rem; font-weight: 700; }
.th-day-date { font-size: .75rem; color: var(--text-muted); }
.th-today-badge {
  margin-left: auto; font-size: .67rem; font-weight: 700;
  background: var(--accent); color: #fff;
  border-radius: 4px; padding: 1px 5px;
}
.th-day.is-weekend .th-day-name { color: #60a5fa; }
.th-day.is-weekend .th-day-date { color: #60a5fa; opacity: .7; }
.th-day.is-sunday  .th-day-name { color: #f85149; }
.th-hours { flex: 1; display: flex; }
.th-hour {
  width: var(--hour-w); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .68rem; color: var(--text-dim);
  border-right: 1px solid var(--border2); user-select: none;
}
.th-hour.h0 { color: var(--text-muted); font-weight: 600; }

/* ── GRADE GROUP ── */
.grade-group { display: flex; flex-direction: column; }
.grade-header {
  position: sticky; top: var(--time-h); z-index: 40;
  display: flex; height: var(--grade-h);
  background: var(--surface);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.grade-label {
  width: var(--label-w); flex-shrink: 0;
  position: sticky; left: 0; z-index: 45;
  background: var(--surface); border-right: 2px solid var(--border);
  display: flex; align-items: center; padding-left: 14px;
  font-size: .73rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
}
.grade-line-row { flex: 1; display: flex; align-items: center; }
.grade-line { height: 2px; width: 100%; opacity: .2; margin: 0 10px; border-radius: 2px; }
.g4 .grade-label { color: var(--g4); } .g4 .grade-line { background: var(--g4); }
.g3 .grade-label { color: var(--g3); } .g3 .grade-line { background: var(--g3); }
.g2 .grade-label { color: var(--g2); } .g2 .grade-line { background: var(--g2); }
.g1 .grade-label { color: var(--g1); } .g1 .grade-line { background: var(--g1); }

/* ── MEMBER ROW ── */
.member-row { display: flex; height: var(--row-h); border-bottom: 1px solid var(--border2); }
.member-row:last-child { border-bottom: 1px solid var(--border); }
.member-label {
  width: var(--label-w); flex-shrink: 0;
  position: sticky; left: 0; z-index: 20;
  background: var(--bg); border-right: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 10px;
  cursor: pointer; transition: background .12s; user-select: none;
}
.member-label:hover { background: var(--surface2); }
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700; flex-shrink: 0; color: #0d1117;
}
.member-name { font-size: .82rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── ROW GRID ── */
.row-grid { flex: 1; position: relative; display: flex; cursor: crosshair; overflow: hidden; }
.day-col { width: var(--day-w); flex-shrink: 0; height: 100%; display: flex; border-right: 2px solid var(--border); }
.day-col.is-today   { background: var(--today-bg); }
.day-col.is-weekend { background: var(--weekend-bg); }
.hour-cell { width: var(--hour-w); flex-shrink: 0; border-right: 1px solid var(--border2); }

/* ── SHIFT BAR ── */
.shift-bar {
  position: absolute; top: 5px; height: calc(100% - 10px);
  border-radius: 6px; display: flex; align-items: center;
  padding: 0 7px; font-size: .71rem; font-weight: 600;
  overflow: hidden; white-space: nowrap; cursor: pointer;
  z-index: 5; color: #0d1117;
  box-shadow: 0 1px 5px rgba(0,0,0,.4);
  transition: opacity .12s, transform .1s;
}
.shift-bar:hover { opacity: .8; transform: scaleY(1.06); }
.shift-bar.desired { opacity: .72; border: 2px dashed rgba(255,255,255,.5); }
.shift-bar.desired::after {
  content: ''; position: absolute; inset: 0; border-radius: 4px;
  background: repeating-linear-gradient(-45deg,transparent 0,transparent 5px,rgba(0,0,0,.2) 5px,rgba(0,0,0,.2) 7px);
  pointer-events: none;
}
.shift-time { font-size: .68rem; opacity: .8; }

/* ── DRAG PREVIEW ── */
.drag-preview {
  position: absolute; top: 5px; height: calc(100% - 10px);
  border-radius: 6px; pointer-events: none; z-index: 20;
  opacity: .6; border: 2px dashed rgba(255,255,255,.6);
  display: flex; align-items: center; padding: 0 7px;
  font-size: .71rem; font-weight: 600; color: #0d1117;
}

/* ── NOW LINE ── */
.now-line {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: var(--danger); z-index: 10; pointer-events: none;
}
.now-line::before {
  content: ''; position: absolute; top: -1px; left: -4px;
  width: 10px; height: 10px; background: var(--danger); border-radius: 50%;
}

/* ── DAY NAVIGATOR ── */
#day-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--daynav-h); background: var(--surface);
  border-top: 1px solid var(--border); display: flex; z-index: 150;
}
.dnav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
  cursor: pointer; border: none; border-right: 1px solid var(--border2);
  background: transparent; color: var(--text-muted);
  transition: background .12s, color .12s; padding: 5px 2px;
}
.dnav-btn:last-child { border-right: none; }
.dnav-btn:hover  { background: var(--surface2); }
.dnav-btn.active { background: var(--accent-soft); color: #a78bfa; }
.dnav-btn.is-today .dnav-dot { background: var(--accent); }
.dnav-name { font-size: .82rem; font-weight: 700; }
.dnav-date { font-size: .7rem; }
.dnav-dot  { width: 4px; height: 4px; border-radius: 50%; }
.dnav-btn.is-weekend .dnav-name { color: #60a5fa; }
.dnav-btn.is-sunday  .dnav-name { color: #f85149; }
.dnav-btn.active .dnav-name,
.dnav-btn.active .dnav-date { color: #a78bfa; }

/* ── MEMBER PANEL ── */
#member-panel {
  position: fixed; right: 0; top: var(--topbar-h); bottom: var(--daynav-h);
  width: 256px; background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
  transform: translateX(100%); transition: transform .22s ease;
}
#member-panel.open { transform: translateX(0); }
.mp-header {
  padding: 13px 13px 11px; font-size: .92rem; font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
#member-list { flex: 1; overflow-y: auto; padding: 9px; display: flex; flex-direction: column; gap: 5px; }
.mc { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 9px 10px; display: flex; align-items: center; gap: 8px; }
.mc-info { flex: 1; min-width: 0; }
.mc-name  { font-size: .85rem; font-weight: 500; }
.mc-grade { font-size: .73rem; color: var(--text-muted); }
.small-btn {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: .82rem; flex-shrink: 0;
}
.small-btn:hover { background: var(--border); }
#add-member-btn {
  margin: 9px; padding: 9px;
  background: var(--accent-soft); border: 1px dashed rgba(124,58,237,.5);
  border-radius: 9px; color: #a78bfa; cursor: pointer;
  text-align: center; font-size: .86rem; font-weight: 600; flex-shrink: 0;
}
#add-member-btn:hover { background: rgba(124,58,237,.2); }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 300; }
.modal-overlay.hidden { display: none; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: min(380px, 94vw); box-shadow: 0 20px 60px rgba(0,0,0,.6); }
.modal-box h3 { font-size: .98rem; margin-bottom: 16px; }
.form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 11px; }
.form-row label { font-size: .78rem; color: var(--text-muted); }
.form-row input, .form-row select { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; color: var(--text); font-size: .87rem; outline: none; width: 100%; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.form-row input[type=color] { padding: 3px; height: 38px; cursor: pointer; }
.modal-actions { display: flex; gap: 7px; margin-top: 16px; flex-wrap: wrap; }
.btn { padding: 8px 15px; border-radius: 7px; border: none; cursor: pointer; font-size: .85rem; font-weight: 600; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .9; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .9; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }

/* ── SHIFT POPUP ── */
#shift-popup { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; min-width: 220px; z-index: 250; box-shadow: 0 12px 40px rgba(0,0,0,.55); display: none; }
#shift-popup.visible { display: block; }
#shift-popup h4 { font-size: .9rem; margin-bottom: 3px; }
.popup-meta { font-size: .78rem; color: var(--text-muted); margin-bottom: 10px; }
.popup-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 11px; }

/* ── TOAST ── */
#toast { position: fixed; bottom: calc(var(--daynav-h) + 12px); left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 8px 18px; font-size: .87rem; box-shadow: 0 8px 32px rgba(0,0,0,.45); z-index: 400; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
#toast.show { opacity: 1; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>📅 シフトスケジューラー</h1>
  <div id="sync-dot" class="connecting"></div>
  <div class="spacer"></div>
  <button class="tb-btn" onclick="prevWeek()">‹ 先週</button>
  <span id="week-range"></span>
  <button class="tb-btn" onclick="nextWeek()">翌週 ›</button>
  <button class="this-week-btn" onclick="goThisWeek()">今週</button>
  <div style="width:1px;height:24px;background:var(--border);margin:0 2px"></div>
  <div class="mode-toggle">
    <button class="mode-btn active m-confirmed" id="btn-confirmed" onclick="setMode('confirmed')">✓ 確定</button>
    <button class="mode-btn m-desired" id="btn-desired" onclick="setMode('desired')">◎ 希望</button>
  </div>
  <button class="icon-btn" onclick="toggleMemberPanel()" title="メンバー管理">👥</button>
</div>

<div id="gantt-wrapper">
  <div id="gantt"></div>
</div>

<div id="day-nav"></div>

<div id="member-panel">
  <div class="mp-header">
    メンバー管理
    <span class="small-btn" onclick="toggleMemberPanel()">✕</span>
  </div>
  <div id="member-list"></div>
  <div id="add-member-btn" onclick="openAddMember()">＋ メンバーを追加</div>
</div>

<div class="modal-overlay hidden" id="member-modal">
  <div class="modal-box">
    <h3 id="member-modal-title">メンバーを追加</h3>
    <div class="form-row"><label>名前</label><input id="m-name" type="text" placeholder="例: 田中 太郎" /></div>
    <div class="form-row">
      <label>学年</label>
      <select id="m-grade">
        <option value="4">4年生</option>
        <option value="3">3年生</option>
        <option value="2">2年生</option>
        <option value="1" selected>1年生</option>
      </select>
    </div>
    <div class="form-row"><label>カラー</label><input id="m-color" type="color" value="#6366f1" /></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveMember()">保存</button>
      <button class="btn btn-ghost" onclick="closeMemberModal()">キャンセル</button>
      <button class="btn btn-danger" id="delete-member-btn" style="display:none" onclick="deleteMember()">削除</button>
    </div>
  </div>
</div>

<div id="shift-popup">
  <h4 id="popup-name"></h4>
  <div class="popup-meta" id="popup-meta"></div>
  <div class="form-row"><label>メモ</label><input id="popup-note" type="text" placeholder="メモを追加..." /></div>
  <div class="popup-actions">
    <button class="btn btn-primary" onclick="saveShiftNote()" style="font-size:.78rem;padding:5px 11px">保存</button>
    <button class="btn btn-danger"  onclick="deleteShift()"   style="font-size:.78rem;padding:5px 11px">削除</button>
    <button class="btn btn-ghost"   onclick="closePopup()"    style="font-size:.78rem;padding:5px 11px">閉じる</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────
const SUPABASE_URL = 'https://abpqnypoqxnphkdssibm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFicHFueXBvcXhucGhrZHNzaWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzQ4OTIsImV4cCI6MjA5NTA1MDg5Mn0.t3cHVWmwHOggCabSsFGNsontegRr4SOI5CZjyeflAYk';

const GRADE_COLORS = { 4:'#a78bfa', 3:'#34d399', 2:'#60a5fa', 1:'#fb923c' };
const GRADE_LABELS = { 4:'4年生', 3:'3年生', 2:'2年生', 1:'1年生' };
const DAY_NAMES    = ['月','火','水','木','金','土','日'];
const HOUR_W = 64, DAY_W = HOUR_W * 24, LABEL_W = 144;

// ── State ──────────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let weekStart = getWeekStart(new Date());
let members = [], shifts = [];
let inputMode = 'confirmed';
let activeShiftId = null, editingMemberId = null, channel = null;

// ── Boot ───────────────────────────────────────────────────────
setSyncStatus('connecting');
loadData();
setupRealtime();
setInterval(drawNowLines, 60000);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePopup(); closeMemberModal(); }
  if (!e.target.matches('input,select,textarea')) {
    if (e.key === 'ArrowLeft')  prevWeek();
    if (e.key === 'ArrowRight') nextWeek();
  }
});
document.getElementById('gantt-wrapper').addEventListener('scroll', updateActiveDayTab, { passive: true });
document.addEventListener('click', e => {
  if (!document.getElementById('shift-popup').contains(e.target)) closePopup();
});

// ── Data ───────────────────────────────────────────────────────
async function loadData() {
  const dates = weekDates();
  try {
    const [mRes, sRes] = await Promise.all([
      sb.from('members').select('*').order('grade', { ascending: false }).order('name'),
      sb.from('shifts').select('*').gte('date', fmtDate(dates[0])).lte('date', fmtDate(dates[6]))
    ]);
    if (mRes.error) throw mRes.error;
    if (sRes.error) throw sRes.error;
    members = mRes.data;
    shifts  = sRes.data;
    setSyncStatus('ok');
    renderAll();
  } catch(err) {
    setSyncStatus('error');
    showToast('エラー: ' + err.message);
  }
}

function setupRealtime() {
  if (channel) sb.removeChannel(channel);
  channel = sb.channel('all')
    .on('postgres_changes', { event:'*', schema:'public', table:'shifts'  }, onShiftChange)
    .on('postgres_changes', { event:'*', schema:'public', table:'members' }, () => loadData())
    .subscribe(s => setSyncStatus(s === 'SUBSCRIBED' ? 'ok' : s === 'CHANNEL_ERROR' ? 'error' : 'connecting'));
}

function onShiftChange(p) {
  const dates = weekDates();
  const s0 = fmtDate(dates[0]), e0 = fmtDate(dates[6]);
  if (p.eventType === 'INSERT') {
    if (p.new.date >= s0 && p.new.date <= e0) { shifts.push(p.new); renderGantt(); }
  } else if (p.eventType === 'UPDATE') {
    const i = shifts.findIndex(s => s.id === p.new.id);
    if (i >= 0) shifts[i] = p.new;
    else if (p.new.date >= s0 && p.new.date <= e0) shifts.push(p.new);
    renderGantt();
  } else if (p.eventType === 'DELETE') {
    shifts = shifts.filter(s => s.id !== p.old.id);
    renderGantt();
  }
}

// ── Render ─────────────────────────────────────────────────────
function renderAll() { renderGantt(); renderMemberPanel(); renderDayNav(); }

function renderGantt() {
  const gantt = document.getElementById('gantt');
  gantt.innerHTML = '';
  const dates    = weekDates();
  const todayStr = fmtDate(new Date());
  gantt.appendChild(buildTimeHeader(dates, todayStr));
  [4,3,2,1].forEach(g => {
    const gm = members.filter(m => m.grade === g);
    if (gm.length) gantt.appendChild(buildGradeGroup(g, gm, dates, todayStr));
  });
  updateWeekRange();
  renderDayNav();
  setTimeout(drawNowLines, 50);
}

function buildTimeHeader(dates, todayStr) {
  const el = document.createElement('div');
  el.id = 'time-header';
  const sp = document.createElement('div');
  sp.className = 'th-spacer';
  sp.innerHTML = '<span>名前</span><span>↕ 時間 →</span>';
  el.appendChild(sp);
  dates.forEach((d, i) => {
    const isToday = fmtDate(d) === todayStr;
    const isSat = i === 5, isSun = i === 6;
    const day = document.createElement('div');
    day.className = 'th-day'+(isToday?' is-today':'')+(isSat?' is-weekend':'')+(isSun?' is-sunday':'');
    const lbl = document.createElement('div');
    lbl.className = 'th-day-label';
    lbl.innerHTML = `<span class="th-day-name">${DAY_NAMES[i]}</span><span class="th-day-date">${d.getMonth()+1}/${d.getDate()}</span>${isToday?'<span class="th-today-badge">TODAY</span>':''}`;
    day.appendChild(lbl);
    const hrs = document.createElement('div');
    hrs.className = 'th-hours';
    for (let h = 0; h < 24; h++) {
      const hel = document.createElement('div');
      hel.className = 'th-hour' + (h === 0 ? ' h0' : '');
      hel.textContent = h === 0 ? '0:00' : h;
      hrs.appendChild(hel);
    }
    day.appendChild(hrs);
    el.appendChild(day);
  });
  return el;
}

function buildGradeGroup(grade, gm, dates, todayStr) {
  const grp = document.createElement('div');
  grp.className = `grade-group g${grade}`;
  const gh = document.createElement('div');
  gh.className = 'grade-header';
  const gl = document.createElement('div');
  gl.className = 'grade-label';
  gl.textContent = GRADE_LABELS[grade];
  const glr = document.createElement('div');
  glr.className = 'grade-line-row';
  const ln = document.createElement('div');
  ln.className = 'grade-line';
  glr.appendChild(ln);
  gh.appendChild(gl);
  gh.appendChild(glr);
  grp.appendChild(gh);
  gm.forEach(m => grp.appendChild(buildMemberRow(m, shifts.filter(s => s.member_id === m.id), dates, todayStr)));
  return grp;
}

function buildMemberRow(member, mShifts, dates, todayStr) {
  const row = document.createElement('div');
  row.className = 'member-row';
  const lbl = document.createElement('div');
  lbl.className = 'member-label';
  const av = document.createElement('div');
  av.className = 'avatar';
  av.style.background = member.color || GRADE_COLORS[member.grade];
  av.textContent = member.name.charAt(0);
  const nm = document.createElement('div');
  nm.className = 'member-name';
  nm.textContent = member.name;
  lbl.appendChild(av); lbl.appendChild(nm);
  lbl.addEventListener('click', () => openEditMember(member));
  row.appendChild(lbl);

  const grid = document.createElement('div');
  grid.className = 'row-grid';
  dates.forEach((d, i) => {
    const isToday = fmtDate(d) === todayStr;
    const isWe = i >= 5;
    const col = document.createElement('div');
    col.className = 'day-col'+(isToday?' is-today':'')+(isWe?' is-weekend':'');
    for (let h = 0; h < 24; h++) { const c = document.createElement('div'); c.className = 'hour-cell'; col.appendChild(c); }
    grid.appendChild(col);
  });
  mShifts.forEach(shift => {
    const di = dayIndex(shift.date);
    if (di >= 0 && di <= 6) grid.appendChild(buildShiftBar(shift, member, di));
  });
  setupDrag(grid, member, dates);
  row.appendChild(grid);
  return row;
}

function buildShiftBar(shift, member, di) {
  const bar = document.createElement('div');
  bar.className = 'shift-bar' + (shift.type === 'desired' ? ' desired' : '');
  bar.style.background = member.color || GRADE_COLORS[member.grade];
  bar.style.left  = (di * DAY_W + (shift.start_minutes / 60) * HOUR_W) + 'px';
  bar.style.width = Math.max(((shift.end_minutes - shift.start_minutes) / 60) * HOUR_W, 6) + 'px';
  const t = document.createElement('span');
  t.className = 'shift-time';
  t.textContent = `${toTime(shift.start_minutes)}–${toTime(shift.end_minutes)}`;
  bar.appendChild(t);
  if (shift.note) {
    const n = document.createElement('span');
    n.textContent = ' ' + shift.note;
    n.style.cssText = 'margin-left:4px;opacity:.75';
    bar.appendChild(n);
  }
  bar.addEventListener('click', e => { e.stopPropagation(); showShiftPopup(shift, member, e); });
  return bar;
}

// ── Drag ───────────────────────────────────────────────────────
function setupDrag(grid, member, dates) {
  let preview = null, startInfo = null;

  function getInfo(cx) {
    const wr = document.getElementById('gantt-wrapper');
    const x  = cx - LABEL_W + wr.scrollLeft;
    const di = Math.max(0, Math.min(6, Math.floor(x / DAY_W)));
    const mins = snap(Math.max(0, Math.min(1440, ((x - di * DAY_W) / HOUR_W) * 60)));
    return { di, mins };
  }

  function startDrag(cx) {
    startInfo = getInfo(cx);
    preview = document.createElement('div');
    preview.className = 'drag-preview';
    preview.style.background = member.color || GRADE_COLORS[member.grade];
    if (inputMode === 'desired') preview.style.opacity = '.5';
    grid.appendChild(preview);
    refreshPrev(startInfo.mins, startInfo.mins);
  }

  function moveDrag(cx) {
    if (!startInfo || !preview) return;
    refreshPrev(startInfo.mins, getInfo(cx).mins);
  }

  async function endDrag(cx) {
    if (!startInfo || !preview) { startInfo = null; return; }
    const end = getInfo(cx).mins;
    preview.remove(); preview = null;
    const s = Math.min(startInfo.mins, end);
    const e = Math.max(startInfo.mins, end);
    const di = startInfo.di;
    startInfo = null;
    if (e - s >= 15) await createShift(member.id, dates[di], s, e);
  }

  function refreshPrev(sMins, eMins) {
    const s = Math.min(sMins, eMins), e = Math.max(sMins, eMins);
    preview.style.left  = (startInfo.di * DAY_W + (s / 60) * HOUR_W) + 'px';
    preview.style.width = Math.max(((e - s) / 60) * HOUR_W, 4) + 'px';
    preview.textContent = `${toTime(s)}–${toTime(e)}`;
  }

  grid.addEventListener('mousedown', e => {
    if (e.target.classList.contains('shift-bar') || e.button !== 0) return;
    e.preventDefault();
    startDrag(e.clientX);
    const mm = e2 => moveDrag(e2.clientX);
    const mu = e2 => { endDrag(e2.clientX); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });
  grid.addEventListener('touchstart', e => { if (!e.target.classList.contains('shift-bar')) startDrag(e.touches[0].clientX); }, { passive: true });
  grid.addEventListener('touchmove',  e => moveDrag(e.touches[0].clientX), { passive: true });
  grid.addEventListener('touchend',   e => endDrag(e.changedTouches[0].clientX));
}

// ── Now Line ───────────────────────────────────────────────────
function drawNowLines() {
  document.querySelectorAll('.now-line').forEach(el => el.remove());
  const todayStr = fmtDate(new Date());
  const di = weekDates().findIndex(d => fmtDate(d) === todayStr);
  if (di < 0) return;
  const now = new Date();
  const x = di * DAY_W + ((now.getHours() * 60 + now.getMinutes()) / 60) * HOUR_W;
  document.querySelectorAll('.row-grid').forEach(grid => {
    const ln = document.createElement('div');
    ln.className = 'now-line';
    ln.style.left = x + 'px';
    grid.appendChild(ln);
  });
}

// ── Day Nav ────────────────────────────────────────────────────
function renderDayNav() {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = '';
  const todayStr = fmtDate(new Date());
  weekDates().forEach((d, i) => {
    const isSat = i === 5, isSun = i === 6;
    const btn = document.createElement('button');
    btn.className = 'dnav-btn'+(fmtDate(d)===todayStr?' is-today':'')+(isSat?' is-weekend':'')+(isSun?' is-sunday':'');
    btn.dataset.i = i;
    btn.innerHTML = `<span class="dnav-name">${DAY_NAMES[i]}</span><span class="dnav-date">${d.getMonth()+1}/${d.getDate()}</span><span class="dnav-dot"></span>`;
    btn.addEventListener('click', () => scrollToDay(i));
    nav.appendChild(btn);
  });
  updateActiveDayTab();
}

function scrollToDay(i) {
  document.getElementById('gantt-wrapper').scrollTo({ left: i * DAY_W, behavior: 'smooth' });
}

function updateActiveDayTab() {
  const sl = document.getElementById('gantt-wrapper').scrollLeft;
  const ai = Math.min(6, Math.floor((sl + DAY_W * 0.3) / DAY_W));
  document.querySelectorAll('.dnav-btn').forEach((b, i) => b.classList.toggle('active', i === ai));
}

function updateWeekRange() {
  const d = weekDates();
  document.getElementById('week-range').textContent =
    `${d[0].getMonth()+1}/${d[0].getDate()}(月) 〜 ${d[6].getMonth()+1}/${d[6].getDate()}(日)`;
}

// ── Week Nav ───────────────────────────────────────────────────
function prevWeek()    { weekStart = new Date(weekStart); weekStart.setDate(weekStart.getDate()-7); loadData(); }
function nextWeek()    { weekStart = new Date(weekStart); weekStart.setDate(weekStart.getDate()+7); loadData(); }
function goThisWeek()  {
  weekStart = getWeekStart(new Date()); loadData();
  setTimeout(() => { const now = new Date(); scrollToDay(now.getDay()===0?6:now.getDay()-1); }, 350);
}

// ── Mode ───────────────────────────────────────────────────────
function setMode(m) {
  inputMode = m;
  const bc = document.getElementById('btn-confirmed');
  const bd = document.getElementById('btn-desired');
  bc.className = 'mode-btn' + (m==='confirmed' ? ' active m-confirmed' : ' m-confirmed');
  bd.className = 'mode-btn' + (m==='desired'   ? ' active m-desired'   : ' m-desired');
}

// ── CRUD ───────────────────────────────────────────────────────
async function createShift(memberId, date, startMin, endMin) {
  try {
    const { error } = await sb.from('shifts').insert({
      member_id: memberId, date: fmtDate(date),
      start_minutes: startMin, end_minutes: endMin, note: '', type: inputMode
    });
    if (error) throw error;
    showToast(inputMode==='desired' ? '◎ 希望シフトを追加しました' : '✓ 確定シフトを追加しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function deleteShift() {
  if (!activeShiftId) return;
  try {
    const { error } = await sb.from('shifts').delete().eq('id', activeShiftId);
    if (error) throw error;
    closePopup(); showToast('削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function saveShiftNote() {
  if (!activeShiftId) return;
  try {
    const { error } = await sb.from('shifts').update({ note: document.getElementById('popup-note').value }).eq('id', activeShiftId);
    if (error) throw error;
    closePopup(); showToast('保存しました ✓');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  const grade = parseInt(document.getElementById('m-grade').value);
  const color = document.getElementById('m-color').value;
  if (!name) { showToast('名前を入力してください'); return; }
  try {
    const { error } = editingMemberId
      ? await sb.from('members').update({name,grade,color}).eq('id', editingMemberId)
      : await sb.from('members').insert({name,grade,color});
    if (error) throw error;
    closeMemberModal(); showToast(editingMemberId ? '更新しました ✓' : '追加しました ✓');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function deleteMember() {
  if (!editingMemberId || !confirm('このメンバーを削除しますか？')) return;
  try {
    const { error } = await sb.from('members').delete().eq('id', editingMemberId);
    if (error) throw error;
    closeMemberModal(); showToast('削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

// ── UI ─────────────────────────────────────────────────────────
function showShiftPopup(shift, member, e) {
  activeShiftId = shift.id;
  const di = dayIndex(shift.date);
  const d  = weekDates()[di];
  document.getElementById('popup-name').textContent = member.name + (shift.type==='desired' ? '  【希望】' : '  【確定】');
  document.getElementById('popup-meta').textContent = (d ? DAY_NAMES[di]+' '+((d.getMonth()+1)+'/'+d.getDate()) : '') + '  ' + toTime(shift.start_minutes) + '〜' + toTime(shift.end_minutes);
  document.getElementById('popup-note').value = shift.note || '';
  const p = document.getElementById('shift-popup');
  p.classList.add('visible');
  let x = e.clientX+12, y = e.clientY+12;
  if (x+240 > window.innerWidth)  x = e.clientX-252;
  if (y+190 > window.innerHeight) y = e.clientY-202;
  p.style.left = x+'px'; p.style.top = y+'px';
}
function closePopup() { document.getElementById('shift-popup').classList.remove('visible'); activeShiftId = null; }

function openAddMember() {
  editingMemberId = null;
  document.getElementById('member-modal-title').textContent = 'メンバーを追加';
  document.getElementById('m-name').value = '';
  document.getElementById('m-grade').value = '1';
  document.getElementById('m-color').value = '#fb923c';
  document.getElementById('delete-member-btn').style.display = 'none';
  document.getElementById('member-modal').classList.remove('hidden');
}
function openEditMember(member) {
  editingMemberId = member.id;
  document.getElementById('member-modal-title').textContent = 'メンバーを編集';
  document.getElementById('m-name').value  = member.name;
  document.getElementById('m-grade').value = member.grade;
  document.getElementById('m-color').value = member.color || GRADE_COLORS[member.grade];
  document.getElementById('delete-member-btn').style.display = '';
  document.getElementById('member-modal').classList.remove('hidden');
}
function closeMemberModal() { document.getElementById('member-modal').classList.add('hidden'); }
function toggleMemberPanel() { document.getElementById('member-panel').classList.toggle('open'); }

function renderMemberPanel() {
  const list = document.getElementById('member-list');
  list.innerHTML = '';
  [4,3,2,1].forEach(g => {
    const gm = members.filter(m => m.grade === g);
    if (!gm.length) return;
    const gh = document.createElement('div');
    gh.style.cssText = `font-size:.7rem;color:${GRADE_COLORS[g]};font-weight:700;padding:6px 3px 3px;letter-spacing:.09em;text-transform:uppercase`;
    gh.textContent = GRADE_LABELS[g];
    list.appendChild(gh);
    gm.forEach(m => {
      const card = document.createElement('div');
      card.className = 'mc';
      card.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:${m.color||GRADE_COLORS[m.grade]};display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#0d1117;flex-shrink:0">${m.name.charAt(0)}</div><div class="mc-info"><div class="mc-name">${m.name}</div><div class="mc-grade">${GRADE_LABELS[m.grade]}</div></div><div class="small-btn" onclick='openEditMember(${JSON.stringify(m)})'>✎</div>`;
      list.appendChild(card);
    });
  });
}

function setSyncStatus(s) { document.getElementById('sync-dot').className = (s==='SUBSCRIBED'||s==='ok') ? 'ok' : s; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Utils ──────────────────────────────────────────────────────
function getWeekStart(d) {
  const r = new Date(d); r.setHours(0,0,0,0);
  const day = r.getDay();
  r.setDate(r.getDate() + (day === 0 ? -6 : 1 - day));
  return r;
}
function weekDates() {
  return Array.from({length:7}, (_,i) => { const d = new Date(weekStart); d.setDate(d.getDate()+i); return d; });
}
function dayIndex(dateStr) {
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const ws = new Date(weekStart); ws.setHours(0,0,0,0);
  return Math.round((d - ws) / 86400000);
}
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function toTime(m)  { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function snap(m)    { return Math.round(m / 15) * 15; }
</script>
