<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフトスケジューラー</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:          #f6f8fa;
  --surface:     #ffffff;
  --surface2:    #f0f3f6;
  --border:      #d0d7de;
  --border2:     #e8ecef;
  --text:        #1f2328;
  --text-muted:  #656d76;
  --text-dim:    #c4cdd5;
  --accent:      #7c3aed;
  --accent-soft: rgba(124,58,237,.08);
  --danger:      #cf222e;
  --success:     #1a7f37;
  --warning:     #9a6700;
  --today-bg:    rgba(124,58,237,.05);
  --weekend-bg:  rgba(0,0,0,.018);
  --desired-bg:  #94a3b8;

  --label-w:      148px;
  --hour-w:       64px;
  --day-w:        calc(var(--hour-w) * 24);
  --row-h:        44px;
  --topbar-h:     54px;
  --dh-h:         40px;   /* day block header */
  --tr-h:         26px;   /* time row */
  --grade-h:      26px;
  --daynav-h:     52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
#topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
  flex-shrink: 0; z-index: 300;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
#topbar h1 { font-size: .95rem; font-weight: 700; white-space: nowrap; }
.tb-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 5px 12px; border-radius: 7px;
  cursor: pointer; font-size: .82rem; font-weight: 500; white-space: nowrap;
}
.tb-btn:hover { background: var(--surface2); }
#week-range { font-size: .88rem; font-weight: 700; min-width: 160px; text-align: center; }
.this-week-btn {
  background: var(--accent-soft); border: 1px solid rgba(124,58,237,.3);
  color: var(--accent); padding: 5px 12px; border-radius: 7px;
  cursor: pointer; font-size: .8rem; font-weight: 700; white-space: nowrap;
}
.this-week-btn:hover { background: rgba(124,58,237,.15); }
.spacer { flex: 1; }
.mode-toggle {
  display: flex; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 2px; gap: 2px;
}
.mode-btn {
  padding: 4px 12px; border-radius: 6px; border: none; cursor: pointer;
  font-size: .8rem; font-weight: 700; background: transparent;
  color: var(--text-muted); transition: all .15s; white-space: nowrap;
}
.mode-btn.active.m-confirmed { background: #2563eb; color: #fff; }
.mode-btn.active.m-desired   { background: #64748b; color: #fff; }
.icon-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; flex-shrink: 0;
}
.icon-btn:hover { background: var(--surface2); }
#sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ok         { background: var(--success); }
.error      { background: var(--danger); }
.connecting { background: var(--warning); animation: blink .9s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── GANTT WRAPPER ── */
#gantt-wrapper {
  flex: 1;
  overflow: auto;
  padding-bottom: var(--daynav-h);
  background: var(--bg);
}

/* ── GANTT ── */
#gantt {
  display: flex;
  flex-direction: column;
  min-width: calc(var(--label-w) + var(--day-w));
}

/* ── DAY BLOCK ── */
.day-block {
  display: flex;
  flex-direction: column;
  border-bottom: 3px solid var(--border);
}

/* ── DAY BLOCK HEADER (sticky per section) ── */
.day-block-header {
  position: sticky;
  top: 0;
  z-index: 55;
  height: var(--dh-h);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  min-width: calc(var(--label-w) + var(--day-w));
}
.day-block-header.is-today {
  background: linear-gradient(90deg, rgba(124,58,237,.1) 0%, rgba(124,58,237,.03) 100%);
  border-bottom-color: rgba(124,58,237,.3);
}
.day-block-header.is-sat { background: rgba(37,99,235,.05); }
.day-block-header.is-sun { background: rgba(207,34,46,.05); }
.dh-name {
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: -.01em;
}
.dh-date {
  font-size: .82rem;
  color: var(--text-muted);
  font-weight: 500;
}
.dh-today-badge {
  font-size: .67rem; font-weight: 700;
  background: var(--accent); color: #fff;
  border-radius: 4px; padding: 2px 6px;
}
.dh-shift-count {
  margin-left: auto;
  font-size: .75rem;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 8px;
}
.is-today .dh-name { color: var(--accent); }
.is-sat .dh-name   { color: #2563eb; }
.is-sun .dh-name   { color: #cf222e; }

/* ── TIME ROW ── */
.time-row {
  position: sticky;
  top: var(--dh-h);
  z-index: 45;
  display: flex;
  height: var(--tr-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.tr-spacer {
  width: var(--label-w);
  flex-shrink: 0;
  position: sticky;
  left: 0;
  z-index: 46;
  background: var(--surface);
  border-right: 2px solid var(--border);
}
.tr-hours { display: flex; flex: 1; }
.tr-hour {
  width: var(--hour-w);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .67rem;
  color: var(--text-dim);
  border-right: 1px solid var(--border2);
  user-select: none;
}
.tr-hour.h0 { color: var(--text-muted); font-weight: 600; }

/* ── GRADE GROUP ── */
.grade-group { display: flex; flex-direction: column; }
.grade-header {
  position: sticky;
  top: calc(var(--dh-h) + var(--tr-h));
  z-index: 35;
  display: flex;
  height: var(--grade-h);
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
}
.grade-label {
  width: var(--label-w);
  flex-shrink: 0;
  position: sticky;
  left: 0;
  z-index: 36;
  background: var(--surface2);
  border-right: 2px solid var(--border);
  display: flex;
  align-items: center;
  padding-left: 14px;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.grade-line-row { flex: 1; display: flex; align-items: center; }
.grade-line { height: 1.5px; width: 100%; opacity: .2; margin: 0 12px; border-radius: 2px; }
.g4 .grade-label { color: #7c3aed; } .g4 .grade-line { background: #7c3aed; }
.g3 .grade-label { color: #059669; } .g3 .grade-line { background: #059669; }
.g2 .grade-label { color: #2563eb; } .g2 .grade-line { background: #2563eb; }
.g1 .grade-label { color: #ea580c; } .g1 .grade-line { background: #ea580c; }

/* ── MEMBER ROW ── */
.member-row {
  display: flex;
  height: var(--row-h);
  border-bottom: 1px solid var(--border2);
  background: var(--surface);
}
.member-row:last-child { border-bottom: none; }
.member-label {
  width: var(--label-w);
  flex-shrink: 0;
  position: sticky;
  left: 0;
  z-index: 20;
  background: var(--surface);
  border-right: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  cursor: pointer;
  transition: background .12s;
  user-select: none;
}
.member-label:hover { background: var(--surface2); }
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700; flex-shrink: 0;
}
.member-name {
  font-size: .83rem; font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── ROW GRID ── */
.row-grid {
  flex: 1;
  position: relative;
  display: flex;
  overflow: hidden;
}
.row-grid.mode-confirmed { cursor: crosshair; }
.row-grid.mode-desired   { cursor: pointer; }
.hour-cell {
  width: var(--hour-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border2);
  height: 100%;
}
.hour-cell.is-today-bg { background: var(--today-bg); }
.hour-cell.is-weekend-bg { background: var(--weekend-bg); }

/* ── SHIFT BAR ── */
.shift-bar {
  position: absolute;
  top: 5px;
  height: calc(100% - 10px);
  border-radius: 6px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: .71rem;
  font-weight: 600;
  overflow: hidden;
  white-space: nowrap;
  cursor: pointer;
  z-index: 5;
  color: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.15);
  transition: opacity .12s, transform .1s;
}
.shift-bar:hover { opacity: .82; transform: scaleY(1.06); }
.shift-bar.desired {
  background: var(--desired-bg) !important;
  border: 1.5px solid rgba(100,116,139,.35);
}
.shift-time { font-size: .67rem; opacity: .9; }

/* ── DRAG PREVIEW ── */
.drag-preview {
  position: absolute;
  top: 5px;
  height: calc(100% - 10px);
  border-radius: 6px;
  pointer-events: none;
  z-index: 20;
  opacity: .5;
  border: 2px dashed rgba(255,255,255,.8);
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: .71rem;
  font-weight: 600;
  color: #fff;
}

/* ── NOW LINE ── */
.now-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--danger);
  z-index: 10;
  pointer-events: none;
  box-shadow: 0 0 4px rgba(207,34,46,.35);
}
.now-line::before {
  content: '';
  position: absolute;
  top: -1px; left: -4px;
  width: 10px; height: 10px;
  background: var(--danger);
  border-radius: 50%;
}

/* ── DAY NAVIGATOR ── */
#day-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--daynav-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
  box-shadow: 0 -1px 4px rgba(0,0,0,.06);
}
.dnav-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
  cursor: pointer;
  border: none; border-right: 1px solid var(--border2);
  background: transparent;
  color: var(--text-muted);
  transition: background .12s;
  padding: 5px 2px;
}
.dnav-btn:last-child { border-right: none; }
.dnav-btn:hover  { background: var(--surface2); }
.dnav-btn.active { background: var(--accent-soft); color: var(--accent); }
.dnav-btn.is-today .dnav-dot { background: var(--accent); }
.dnav-name { font-size: .82rem; font-weight: 700; }
.dnav-date { font-size: .7rem; }
.dnav-dot  { width: 4px; height: 4px; border-radius: 50%; }
.dnav-btn.is-sat .dnav-name  { color: #2563eb; }
.dnav-btn.is-sun .dnav-name  { color: #cf222e; }
.dnav-btn.active .dnav-name,
.dnav-btn.active .dnav-date  { color: var(--accent); }

/* ── MEMBER PANEL ── */
#member-panel {
  position: fixed; right: 0; top: var(--topbar-h); bottom: var(--daynav-h);
  width: 256px; background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
  transform: translateX(100%); transition: transform .22s ease;
  box-shadow: -2px 0 8px rgba(0,0,0,.06);
}
#member-panel.open { transform: translateX(0); }
.mp-header {
  padding: 13px 14px 11px; font-size: .92rem; font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
#member-list { flex: 1; overflow-y: auto; padding: 9px; display: flex; flex-direction: column; gap: 5px; }
.mc { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 9px 10px; display: flex; align-items: center; gap: 8px; }
.mc-info { flex: 1; min-width: 0; }
.mc-name  { font-size: .85rem; font-weight: 500; }
.mc-grade { font-size: .73rem; color: var(--text-muted); }
.small-btn {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: .82rem; flex-shrink: 0;
}
.small-btn:hover { background: var(--border); }
#add-member-btn {
  margin: 9px; padding: 9px;
  background: var(--accent-soft); border: 1px dashed rgba(124,58,237,.4);
  border-radius: 9px; color: var(--accent); cursor: pointer;
  text-align: center; font-size: .86rem; font-weight: 600; flex-shrink: 0;
}
#add-member-btn:hover { background: rgba(124,58,237,.14); }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 400; }
.modal-overlay.hidden { display: none; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: min(380px, 94vw); box-shadow: 0 20px 50px rgba(0,0,0,.15); }
.modal-box h3 { font-size: .98rem; margin-bottom: 16px; }
.form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-row label { font-size: .78rem; color: var(--text-muted); font-weight: 500; }
.form-row input, .form-row select { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; color: var(--text); font-size: .87rem; outline: none; width: 100%; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); background: var(--surface); }
.form-row input[type=color] { padding: 3px; height: 38px; cursor: pointer; }
.form-row input[type=time]  { font-size: .95rem; font-weight: 500; }
.modal-actions { display: flex; gap: 7px; margin-top: 16px; flex-wrap: wrap; }
.btn { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: .85rem; font-weight: 600; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { opacity: .9; }
.btn-gray { background: #64748b; color: #fff; }
.btn-gray:hover { opacity: .9; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: .9; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border2); }
.dm-info { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; }
.dm-info strong { color: var(--text); font-size: .92rem; display: block; margin-bottom: 2px; }
.dm-info span   { font-size: .82rem; color: var(--text-muted); }
.time-row-inputs { display: flex; gap: 10px; align-items: flex-end; }
.time-row-inputs .form-row { flex: 1; margin-bottom: 0; }
.time-sep { font-size: 1rem; color: var(--text-muted); padding-bottom: 8px; }

/* ── SHIFT POPUP ── */
#shift-popup { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; min-width: 224px; z-index: 350; box-shadow: 0 8px 30px rgba(0,0,0,.12); display: none; }
#shift-popup.visible { display: block; }
#shift-popup h4 { font-size: .9rem; margin-bottom: 3px; }
.popup-meta { font-size: .78rem; color: var(--text-muted); margin-bottom: 10px; }
.popup-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 11px; }

/* ── TOAST ── */
#toast { position: fixed; bottom: calc(var(--daynav-h) + 14px); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); border-radius: 9px; padding: 8px 18px; font-size: .87rem; box-shadow: 0 4px 20px rgba(0,0,0,.2); z-index: 500; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
#toast.show { opacity: 1; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>📅 シフトスケジューラー</h1>
  <div id="sync-dot" class="connecting"></div>
  <div class="spacer"></div>
  <button class="tb-btn" onclick="prevWeek()">‹ 先週</button>
  <span id="week-range"></span>
  <button class="tb-btn" onclick="nextWeek()">翌週 ›</button>
  <button class="this-week-btn" onclick="goThisWeek()">今週</button>
  <div style="width:1px;height:24px;background:var(--border);margin:0 2px"></div>
  <div class="mode-toggle">
    <button class="mode-btn active m-confirmed" id="btn-confirmed" onclick="setMode('confirmed')">✓ 確定</button>
    <button class="mode-btn m-desired"           id="btn-desired"   onclick="setMode('desired')">◎ 希望</button>
  </div>
  <button class="icon-btn" onclick="toggleMemberPanel()">👥</button>
</div>

<div id="gantt-wrapper">
  <div id="gantt"></div>
</div>

<div id="day-nav"></div>

<!-- メンバーパネル -->
<div id="member-panel">
  <div class="mp-header">
    メンバー管理
    <span class="small-btn" onclick="toggleMemberPanel()">✕</span>
  </div>
  <div id="member-list"></div>
  <div id="add-member-btn" onclick="openAddMember()">＋ メンバーを追加</div>
</div>

<!-- メンバー編集 -->
<div class="modal-overlay hidden" id="member-modal">
  <div class="modal-box">
    <h3 id="member-modal-title">メンバーを追加</h3>
    <div class="form-row"><label>名前</label><input id="m-name" type="text" placeholder="例: 田中 太郎" /></div>
    <div class="form-row">
      <label>学年</label>
      <select id="m-grade">
        <option value="4">4年生</option><option value="3">3年生</option>
        <option value="2">2年生</option><option value="1" selected>1年生</option>
      </select>
    </div>
    <div class="form-row"><label>カラー</label><input id="m-color" type="color" value="#7c3aed" /></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveMember()">保存</button>
      <button class="btn btn-ghost" onclick="closeMemberModal()">キャンセル</button>
      <button class="btn btn-danger" id="delete-member-btn" style="display:none" onclick="deleteMember()">削除</button>
    </div>
  </div>
</div>

<!-- 希望シフト入力 -->
<div class="modal-overlay hidden" id="desired-modal">
  <div class="modal-box">
    <h3>◎ 希望シフトを入力</h3>
    <div class="dm-info">
      <strong id="dm-member"></strong>
      <span id="dm-date"></span>
    </div>
    <div class="time-row-inputs">
      <div class="form-row"><label>開始時間</label><input id="dm-start" type="time" step="900" /></div>
      <span class="time-sep">〜</span>
      <div class="form-row"><label>終了時間</label><input id="dm-end" type="time" step="900" /></div>
    </div>
    <div class="form-row" style="margin-top:12px"><label>メモ（任意）</label><input id="dm-note" type="text" placeholder="備考など..." /></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="saveDesiredShift()">追加する</button>
      <button class="btn btn-ghost" onclick="closeDesiredModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- シフトポップアップ -->
<div id="shift-popup">
  <h4 id="popup-name"></h4>
  <div class="popup-meta" id="popup-meta"></div>
  <div class="form-row"><label>メモ</label><input id="popup-note" type="text" placeholder="メモを追加..." /></div>
  <div class="popup-actions">
    <button class="btn btn-primary" onclick="saveShiftNote()" style="font-size:.78rem;padding:5px 11px">保存</button>
    <button class="btn btn-danger"  onclick="deleteShift()"   style="font-size:.78rem;padding:5px 11px">削除</button>
    <button class="btn btn-ghost"   onclick="closePopup()"    style="font-size:.78rem;padding:5px 11px">閉じる</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────

// ── Data ───────────────────────────────────────────────────────
async function loadData() {
  const dates = weekDates();
  try {
    const [mRes, sRes] = await Promise.all([
      sb.from('members').select('*').order('grade', { ascending: false }).order('name'),
      sb.from('shifts').select('*').gte('date', fmtDate(dates[0])).lte('date', fmtDate(dates[6]))
    ]);
    if (mRes.error) throw mRes.error;
    if (sRes.error) throw sRes.error;
    members = mRes.data;
    shifts  = sRes.data;
    setSyncStatus('ok');
    renderAll();
  } catch(err) {
    setSyncStatus('error');
    showToast('エラー: ' + err.message);
  }
}

function setupRealtime() {
  if (channel) sb.removeChannel(channel);
  channel = sb.channel('all')
    .on('postgres_changes', { event:'*', schema:'public', table:'shifts'  }, onShiftChange)
    .on('postgres_changes', { event:'*', schema:'public', table:'members' }, () => loadData())
    .subscribe(s => setSyncStatus(s === 'SUBSCRIBED' ? 'ok' : s === 'CHANNEL_ERROR' ? 'error' : 'connecting'));
}

function onShiftChange(p) {
  const dates = weekDates();
  const s0 = fmtDate(dates[0]), e0 = fmtDate(dates[6]);
  if (p.eventType === 'INSERT') {
    if (p.new.date >= s0 && p.new.date <= e0) { shifts.push(p.new); renderGantt(); }
  } else if (p.eventType === 'UPDATE') {
    const i = shifts.findIndex(s => s.id === p.new.id);
    if (i >= 0) shifts[i] = p.new; else if (p.new.date >= s0 && p.new.date <= e0) shifts.push(p.new);
    renderGantt();
  } else if (p.eventType === 'DELETE') {
    shifts = shifts.filter(s => s.id !== p.old.id);
    renderGantt();
  }
}

// ── Render ─────────────────────────────────────────────────────
function renderAll() { renderGantt(); renderMemberPanel(); renderDayNav(); }

function renderGantt() {
  const gantt = document.getElementById('gantt');
  gantt.innerHTML = '';
  const dates    = weekDates();
  const todayStr = fmtDate(new Date());

  dates.forEach((date, i) => {
    gantt.appendChild(buildDayBlock(date, i, todayStr));
  });

  updateWeekRange();
  renderDayNav();
  setTimeout(drawNowLines, 50);
}

function buildDayBlock(date, dayIdx, todayStr) {
  const dateStr  = fmtDate(date);
  const isToday  = dateStr === todayStr;
  const isSat    = dayIdx === 5;
  const isSun    = dayIdx === 6;

  const block = document.createElement('div');
  block.className = 'day-block';
  block.dataset.dayIdx = dayIdx;

  // ── Day header ──
  const header = document.createElement('div');
  header.className = 'day-block-header' + (isToday?' is-today':'') + (isSat?' is-sat':'') + (isSun?' is-sun':'');
  const dayShiftCount = shifts.filter(s => s.date === dateStr).length;
  header.innerHTML = `
    <span class="dh-name">${DAY_NAMES_FULL[dayIdx]}</span>
    <span class="dh-date">${date.getMonth()+1}月${date.getDate()}日</span>
    ${isToday ? '<span class="dh-today-badge">TODAY</span>' : ''}
    ${dayShiftCount > 0 ? `<span class="dh-shift-count">${dayShiftCount} シフト</span>` : ''}
  `;
  block.appendChild(header);

  // ── Time row ──
  const timeRow = document.createElement('div');
  timeRow.className = 'time-row';
  const trSpacer = document.createElement('div');
  trSpacer.className = 'tr-spacer';
  const trHours = document.createElement('div');
  trHours.className = 'tr-hours';
  for (let h = 0; h < 24; h++) {
    const he = document.createElement('div');
    he.className = 'tr-hour' + (h===0?' h0':'');
    he.textContent = h === 0 ? '0:00' : h;
    trHours.appendChild(he);
  }
  timeRow.appendChild(trSpacer);
  timeRow.appendChild(trHours);
  block.appendChild(timeRow);

  // ── Grade groups ──
  [4,3,2,1].forEach(grade => {
    const gm = members.filter(m => m.grade === grade);
    if (!gm.length) return;

    const grp = document.createElement('div');
    grp.className = `grade-group g${grade}`;

    const gh = document.createElement('div');
    gh.className = 'grade-header';
    const gl = document.createElement('div');
    gl.className = 'grade-label';
    gl.textContent = GRADE_LABELS[grade];
    const glr = document.createElement('div');
    glr.className = 'grade-line-row';
    const ln = document.createElement('div');
    ln.className = 'grade-line';
    glr.appendChild(ln);
    gh.appendChild(gl); gh.appendChild(glr);
    grp.appendChild(gh);

    gm.forEach(member => {
      const mShifts = shifts.filter(s => s.member_id === member.id && s.date === dateStr);
      grp.appendChild(buildMemberRow(member, mShifts, date, isToday, isSat || isSun));
    });

    block.appendChild(grp);
  });

  return block;
}

function buildMemberRow(member, mShifts, date, isToday, isWeekend) {
  const row = document.createElement('div');
  row.className = 'member-row';

  const lbl = document.createElement('div');
  lbl.className = 'member-label';
  const mc = member.color || GRADE_COLORS[member.grade];
  const av = document.createElement('div');
  av.className = 'avatar';
  av.style.cssText = `background:${mc}22;color:${mc};border:1.5px solid ${mc}55`;
  av.textContent = member.name.charAt(0);
  const nm = document.createElement('div');
  nm.className = 'member-name';
  nm.textContent = member.name;
  lbl.appendChild(av); lbl.appendChild(nm);
  lbl.addEventListener('click', () => openEditMember(member));
  row.appendChild(lbl);

  const grid = document.createElement('div');
  grid.className = 'row-grid mode-' + inputMode;

  // Hour cells (background)
  for (let h = 0; h < 24; h++) {
    const c = document.createElement('div');
    c.className = 'hour-cell' + (isToday?' is-today-bg':'') + (isWeekend?' is-weekend-bg':'');
    grid.appendChild(c);
  }

  // Shift bars
  mShifts.forEach(shift => {
    grid.appendChild(buildShiftBar(shift, member));
  });

  setupInteraction(grid, member, date);
  row.appendChild(grid);
  return row;
}

function buildShiftBar(shift, member) {
  const isDesired = shift.type === 'desired';
  const bar = document.createElement('div');
  bar.className = 'shift-bar ' + (isDesired ? 'desired' : 'confirmed');
  if (!isDesired) bar.style.background = member.color || GRADE_COLORS[member.grade];
  bar.style.left  = ((shift.start_minutes / 60) * HOUR_W) + 'px';
  bar.style.width = Math.max(((shift.end_minutes - shift.start_minutes) / 60) * HOUR_W, 6) + 'px';
  const t = document.createElement('span');
  t.className = 'shift-time';
  t.textContent = `${toTime(shift.start_minutes)}–${toTime(shift.end_minutes)}`;
  bar.appendChild(t);
  if (shift.note) {
    const n = document.createElement('span');
    n.textContent = ' ' + shift.note;
    n.style.cssText = 'margin-left:4px;opacity:.8';
    bar.appendChild(n);
  }
  bar.addEventListener('click', e => { e.stopPropagation(); showShiftPopup(shift, member, e); });
  return bar;
}

// ── Interaction ────────────────────────────────────────────────
function setupInteraction(grid, member, date) {
  let preview = null, startMins = null;

  function getMinutes(cx) {
    const wr = document.getElementById('gantt-wrapper');
    const x  = cx - LABEL_W + wr.scrollLeft;
    return snap(Math.max(0, Math.min(1440, (x / HOUR_W) * 60)));
  }

  // 確定：ドラッグ
  grid.addEventListener('mousedown', e => {
    if (inputMode !== 'confirmed' || e.target.classList.contains('shift-bar') || e.button !== 0) return;
    e.preventDefault();
    startMins = getMinutes(e.clientX);
    preview = document.createElement('div');
    preview.className = 'drag-preview';
    preview.style.background = member.color || GRADE_COLORS[member.grade];
    grid.appendChild(preview);
    refreshPrev(startMins, startMins);

    const mm = e2 => {
      if (startMins === null) return;
      refreshPrev(startMins, getMinutes(e2.clientX));
    };
    const mu = async e2 => {
      document.removeEventListener('mousemove', mm);
      document.removeEventListener('mouseup', mu);
      if (startMins === null || !preview) return;
      const endMins = getMinutes(e2.clientX);
      preview.remove(); preview = null;
      const s = Math.min(startMins, endMins);
      const e = Math.max(startMins, endMins);
      startMins = null;
      if (e - s >= 15) await createShift(member.id, date, s, e, 'confirmed');
    };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });

  // タッチ対応（確定）
  grid.addEventListener('touchstart', e => {
    if (inputMode !== 'confirmed' || e.target.classList.contains('shift-bar')) return;
    startMins = getMinutes(e.touches[0].clientX);
    preview = document.createElement('div');
    preview.className = 'drag-preview';
    preview.style.background = member.color || GRADE_COLORS[member.grade];
    grid.appendChild(preview);
    refreshPrev(startMins, startMins);
  }, { passive: true });
  grid.addEventListener('touchmove', e => {
    if (inputMode !== 'confirmed' || startMins === null) return;
    refreshPrev(startMins, getMinutes(e.touches[0].clientX));
  }, { passive: true });
  grid.addEventListener('touchend', async e => {
    if (inputMode !== 'confirmed' || startMins === null || !preview) return;
    const endMins = getMinutes(e.changedTouches[0].clientX);
    preview.remove(); preview = null;
    const s = Math.min(startMins, endMins);
    const ec = Math.max(startMins, endMins);
    startMins = null;
    if (ec - s >= 15) await createShift(member.id, date, s, ec, 'confirmed');
  });

  function refreshPrev(s0, e0) {
    const s = Math.min(s0, e0), e = Math.max(s0, e0);
    preview.style.left  = (s / 60 * HOUR_W) + 'px';
    preview.style.width = Math.max((e - s) / 60 * HOUR_W, 4) + 'px';
    preview.textContent = `${toTime(s)}–${toTime(e)}`;
  }

  // 希望：クリック→モーダル
  grid.addEventListener('click', e => {
    if (inputMode !== 'desired' || e.target.classList.contains('shift-bar')) return;
    openDesiredModal(member, date, getMinutes(e.clientX));
  });
}

// ── Now Line ───────────────────────────────────────────────────
function drawNowLines() {
  document.querySelectorAll('.now-line').forEach(el => el.remove());
  const todayStr = fmtDate(new Date());
  const now = new Date();
  const x = ((now.getHours() * 60 + now.getMinutes()) / 60) * HOUR_W;
  // Find the day block for today
  document.querySelectorAll('.day-block').forEach(block => {
    const header = block.querySelector('.day-block-header');
    if (header && header.classList.contains('is-today')) {
      block.querySelectorAll('.row-grid').forEach(grid => {
        const ln = document.createElement('div');
        ln.className = 'now-line';
        ln.style.left = x + 'px';
        grid.appendChild(ln);
      });
    }
  });
}

// ── Day Nav ────────────────────────────────────────────────────
function renderDayNav() {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = '';
  const todayStr = fmtDate(new Date());
  weekDates().forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'dnav-btn'+(fmtDate(d)===todayStr?' is-today':'')+(i===5?' is-sat':'')+(i===6?' is-sun':'');
    btn.innerHTML = `<span class="dnav-name">${DAY_NAMES[i]}</span><span class="dnav-date">${d.getMonth()+1}/${d.getDate()}</span><span class="dnav-dot"></span>`;
    btn.addEventListener('click', () => scrollToDay(i));
    nav.appendChild(btn);
  });
  updateActiveDayTab();
}

function scrollToDay(i) {
  const blocks = document.querySelectorAll('.day-block');
  if (blocks[i]) {
    document.getElementById('gantt-wrapper').scrollTo({ top: blocks[i].offsetTop, behavior: 'smooth' });
  }
}

function onScroll() { updateActiveDayTab(); }

function updateActiveDayTab() {
  const wrapper  = document.getElementById('gantt-wrapper');
  const scrollTop = wrapper.scrollTop + 60;
  const blocks   = document.querySelectorAll('.day-block');
  let activeDay  = 0;
  blocks.forEach((b, i) => { if (b.offsetTop <= scrollTop) activeDay = i; });
  document.querySelectorAll('.dnav-btn').forEach((b, i) => b.classList.toggle('active', i === activeDay));
}

function updateWeekRange() {
  const d = weekDates();
  document.getElementById('week-range').textContent =
    `${d[0].getMonth()+1}/${d[0].getDate()}(月) 〜 ${d[6].getMonth()+1}/${d[6].getDate()}(日)`;
}

// ── Week Nav ───────────────────────────────────────────────────
function prevWeek()   { weekStart = new Date(weekStart); weekStart.setDate(weekStart.getDate()-7); loadData(); }
function nextWeek()   { weekStart = new Date(weekStart); weekStart.setDate(weekStart.getDate()+7); loadData(); }
function goThisWeek() {
  weekStart = getWeekStart(new Date()); loadData();
  setTimeout(() => { const now = new Date(); scrollToDay(now.getDay()===0?6:now.getDay()-1); }, 400);
}

// ── Mode ───────────────────────────────────────────────────────
function setMode(m) {
  inputMode = m;
  document.getElementById('btn-confirmed').className = 'mode-btn'+(m==='confirmed'?' active m-confirmed':' m-confirmed');
  document.getElementById('btn-desired').className   = 'mode-btn'+(m==='desired'  ?' active m-desired'  :' m-desired');
  document.querySelectorAll('.row-grid').forEach(g => { g.className = 'row-grid mode-' + m; });
}

// ── 希望シフトモーダル ──────────────────────────────────────────
function openDesiredModal(member, date, suggestedMins) {
  desiredCtx = { member, date };
  document.getElementById('dm-member').textContent = member.name;
  const di = weekDates().findIndex(d => fmtDate(d) === fmtDate(date));
  document.getElementById('dm-date').textContent =
    `${DAY_NAMES_FULL[di]}  ${date.getMonth()+1}月${date.getDate()}日`;
  const s = snap(suggestedMins), e = snap(Math.min(s + 120, 1440));
  document.getElementById('dm-start').value = toTimeInput(s);
  document.getElementById('dm-end').value   = toTimeInput(e);
  document.getElementById('dm-note').value  = '';
  document.getElementById('desired-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('dm-start').focus(), 80);
}
function closeDesiredModal() { document.getElementById('desired-modal').classList.add('hidden'); desiredCtx = null; }
async function saveDesiredShift() {
  if (!desiredCtx) return;
  const sv = document.getElementById('dm-start').value;
  const ev = document.getElementById('dm-end').value;
  const note = document.getElementById('dm-note').value.trim();
  if (!sv || !ev) { showToast('時間を入力してください'); return; }
  const sMin = timeToMins(sv), eMin = timeToMins(ev);
  if (eMin <= sMin) { showToast('終了時間は開始時間より後にしてください'); return; }
  await createShift(desiredCtx.member.id, desiredCtx.date, sMin, eMin, 'desired', note);
  closeDesiredModal();
}

// ── CRUD ───────────────────────────────────────────────────────
async function createShift(memberId, date, startMin, endMin, type = 'confirmed', note = '') {
  try {
    const { error } = await sb.from('shifts').insert({
      member_id: memberId, date: fmtDate(date),
      start_minutes: startMin, end_minutes: endMin, note, type
    });
    if (error) throw error;
    showToast(type==='desired' ? '◎ 希望シフトを追加しました' : '✓ 確定シフトを追加しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function deleteShift() {
  if (!activeShiftId) return;
  try {
    const { error } = await sb.from('shifts').delete().eq('id', activeShiftId);
    if (error) throw error;
    closePopup(); showToast('削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function saveShiftNote() {
  if (!activeShiftId) return;
  try {
    const { error } = await sb.from('shifts').update({ note: document.getElementById('popup-note').value }).eq('id', activeShiftId);
    if (error) throw error;
    closePopup(); showToast('保存しました ✓');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function saveMember() {
  const name = document.getElementById('m-name').value.trim();
  const grade = parseInt(document.getElementById('m-grade').value);
  const color = document.getElementById('m-color').value;
  if (!name) { showToast('名前を入力してください'); return; }
  try {
    const { error } = editingMemberId
      ? await sb.from('members').update({name,grade,color}).eq('id', editingMemberId)
      : await sb.from('members').insert({name,grade,color});
    if (error) throw error;
    closeMemberModal(); showToast(editingMemberId ? '更新しました ✓' : '追加しました ✓');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function deleteMember() {
  if (!editingMemberId || !confirm('このメンバーを削除しますか？')) return;
  try {
    const { error } = await sb.from('members').delete().eq('id', editingMemberId);
    if (error) throw error;
    closeMemberModal(); showToast('削除しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

// ── Shift Popup ────────────────────────────────────────────────
function showShiftPopup(shift, member, e) {
  activeShiftId = shift.id;
  const d = new Date(shift.date + 'T00:00:00');
  const di = weekDates().findIndex(wd => fmtDate(wd) === shift.date);
  document.getElementById('popup-name').textContent = member.name + (shift.type==='desired' ? '  ◎ 希望' : '  ✓ 確定');
  document.getElementById('popup-meta').textContent =
    `${DAY_NAMES[di>=0?di:0]}曜  ${d.getMonth()+1}/${d.getDate()}  ${toTime(shift.start_minutes)}〜${toTime(shift.end_minutes)}`;
  document.getElementById('popup-note').value = shift.note || '';
  const p = document.getElementById('shift-popup');
  p.classList.add('visible');
  let x = e.clientX+12, y = e.clientY+12;
  if (x+240>window.innerWidth)  x = e.clientX-252;
  if (y+200>window.innerHeight) y = e.clientY-212;
  p.style.left = x+'px'; p.style.top = y+'px';
}
function closePopup() { document.getElementById('shift-popup').classList.remove('visible'); activeShiftId = null; }

function openAddMember() {
  editingMemberId = null;
  document.getElementById('member-modal-title').textContent = 'メンバーを追加';
  document.getElementById('m-name').value  = '';
  document.getElementById('m-grade').value = '1';
  document.getElementById('m-color').value = '#ea580c';
  document.getElementById('delete-member-btn').style.display = 'none';
  document.getElementById('member-modal').classList.remove('hidden');
}
function openEditMember(member) {
  editingMemberId = member.id;
  document.getElementById('member-modal-title').textContent = 'メンバーを編集';
  document.getElementById('m-name').value  = member.name;
  document.getElementById('m-grade').value = member.grade;
  document.getElementById('m-color').value = member.color || GRADE_COLORS[member.grade];
  document.getElementById('delete-member-btn').style.display = '';
  document.getElementById('member-modal').classList.remove('hidden');
}
function closeMemberModal() { document.getElementById('member-modal').classList.add('hidden'); }
function toggleMemberPanel() { document.getElementById('member-panel').classList.toggle('open'); }

function renderMemberPanel() {
  const list = document.getElementById('member-list');
  list.innerHTML = '';
  [4,3,2,1].forEach(g => {
    const gm = members.filter(m => m.grade === g);
    if (!gm.length) return;
    const gh = document.createElement('div');
    gh.style.cssText = `font-size:.7rem;color:${GRADE_COLORS[g]};font-weight:700;padding:6px 3px 3px;letter-spacing:.08em;text-transform:uppercase`;
    gh.textContent = GRADE_LABELS[g];
    list.appendChild(gh);
    gm.forEach(m => {
      const mc = m.color || GRADE_COLORS[m.grade];
      const card = document.createElement('div');
      card.className = 'mc';
      card.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:${mc}22;border:1.5px solid ${mc}55;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:${mc};flex-shrink:0">${m.name.charAt(0)}</div><div class="mc-info"><div class="mc-name">${m.name}</div><div class="mc-grade">${GRADE_LABELS[m.grade]}</div></div><div class="small-btn" onclick='openEditMember(${JSON.stringify(m)})'>✎</div>`;
      list.appendChild(card);
    });
  });
}

// ── Utils ──────────────────────────────────────────────────────
function setSyncStatus(s) { document.getElementById('sync-dot').className = (s==='SUBSCRIBED'||s==='ok')?'ok':s; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
function getWeekStart(d) {
  const r = new Date(d); r.setHours(0,0,0,0);
  const day = r.getDay();
  r.setDate(r.getDate() + (day===0?-6:1-day));
  return r;
}
function weekDates() {
  return Array.from({length:7},(_,i)=>{ const d=new Date(weekStart); d.setDate(d.getDate()+i); return d; });
}
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function toTime(m)      { return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function toTimeInput(m) { return toTime(m); }
function timeToMins(s)  { const [h,m]=s.split(':').map(Number); return h*60+m; }
function snap(m)        { return Math.round(m/15)*15; }
